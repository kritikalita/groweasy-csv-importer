services:
  backend:
    build:
      context: ./backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
    volumes:
      - ./backend:/app
      - /app/node_modules # 👈 Keeps the container-built Linux node_modules safe!

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001
    volumes:
      - ./frontend:/app
      - /app/node_modules # 👈 Keeps the frontend dependencies safe too!
    depends_on:
      - backend